<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>SPHERE CLUB オーナー登録</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="background:#eee;">
  <p style="font-size:14px;padding:8px;">
    読み込み中です…少々お待ちください。
  </p>

  <script>
    // ★あとで本物を入れる
    const LIFF_ID ='2009203252-28MV0u5y';
    const MAKE_WEBHOOK_URL = 'https://hook.us2.make.com/rz9spqo3wja7f4rimw4sqxq53liqguky';
    const OFFICIAL_LINE_URL = 'https://line.me/R/ti/p/@592txhpn'; //
    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        const params = new URLSearchParams(window.location.search);
        const sid = params.get('sid');

        const res = await fetch(MAKE_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            displayName: profile.displayName,
            userId: profile.userId,
            serial: sid,
          }),
        });

        if (!res.ok) {
          throw new Error('Webhook Error: ' + res.status);
        }

        alert('登録が完了しました。ご協力ありがとうございます。');

        // 公式LINEのトーク／友だち追加画面へ誘導
        if (liff.isInClient()) {
            // LINEアプリ内で公式アカウントを開く
           liff.openWindow({
    url: OFFICIAL_LINE_URL,
    external: false
  });
} else {
  // ブラウザから開かれていた場合もLINEを開きにいく
  window.location.href = OFFICIAL_LINE_URL;
}
        
      } catch (e) {
        alert('エラー内容: ' + (e.message || e));
      }
    }

    main();
  </script>
</body>
</html>
